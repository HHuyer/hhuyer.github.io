
<style>
  #scene { position: relative; width: 100%; height: 420px; overflow: hidden; cursor: default; user-select: none; }
  #textLayer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2; pointer-events: none; text-align: center; font-size: 28px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; line-height: 1.5; }
  .creature { position: absolute; font-size: 32px; cursor: pointer; z-index: var(--z); transition: transform 0.1s; will-change: transform; line-height: 1; }
  .creature:hover { transform: scale(1.2); }
  .floatie { position: absolute; pointer-events: none; font-size: 22px; animation: floatUp 1.2s ease-out forwards; }
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(0.5)} }
  #hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 12px; color: var(--color-text-tertiary); pointer-events: none; }
</style>

<div id="scene">
  <div id="textLayer">🌊 Hello, Ocean World! 🌊</div>
  <div id="hint">click a creature to scare it away</div>
</div>

<script>
const scene = document.getElementById('scene');
const textLayer = document.getElementById('textLayer');

const creatureEmojis = ['🐠','🐟','🦑','🐙','🦀','🐡','🐬','🦞','🦐','🐋','🐊','🦈','🦭','🐢'];
const burstEmojis = ['💦','🫧','✨','💨','🌀','⭐','🌟'];

const W = () => scene.offsetWidth;
const H = () => scene.offsetHeight;

const creatures = [];
const NUM = 12;

function randBetween(a, b) { return a + Math.random() * (b - a); }

for (let i = 0; i < NUM; i++) {
  const el = document.createElement('div');
  el.className = 'creature';
  el.textContent = creatureEmojis[i % creatureEmojis.length];

  const zLayer = Math.random() < 0.5 ? 1 : 3;
  el.style.setProperty('--z', zLayer);
  el.style.zIndex = zLayer;

  const c = {
    el,
    x: randBetween(20, W() - 60),
    y: randBetween(20, H() - 60),
    vx: randBetween(-1.2, 1.2) || 0.5,
    vy: randBetween(-0.8, 0.8) || 0.3,
    scared: false,
    scaredTimer: 0,
    layer: zLayer,
    flip: false
  };
  creatures.push(c);

  el.addEventListener('click', (e) => {
    e.stopPropagation();
    c.scared = true;
    c.scaredTimer = 90;
    c.vx = (Math.random() - 0.5) * 8;
    c.vy = (Math.random() - 0.5) * 8;

    for (let b = 0; b < 4; b++) {
      const fx = c.x + 16 + randBetween(-20, 20);
      const fy = c.y + randBetween(-10, 10);
      spawnFloat(burstEmojis[Math.floor(Math.random() * burstEmojis.length)], fx, fy);
    }
  });

  scene.appendChild(el);
}

function spawnFloat(emoji, x, y) {
  const f = document.createElement('div');
  f.className = 'floatie';
  f.textContent = emoji;
  f.style.left = x + 'px';
  f.style.top = y + 'px';
  f.style.zIndex = 10;
  scene.appendChild(f);
  setTimeout(() => f.remove(), 1300);
}

function tick() {
  const w = W(), h = H();
  for (const c of creatures) {
    if (c.scared) {
      c.scaredTimer--;
      if (c.scaredTimer <= 0) {
        c.scared = false;
        c.vx = randBetween(-1.2, 1.2) || 0.4;
        c.vy = randBetween(-0.8, 0.8) || 0.3;
      }
      c.vx *= 0.96;
      c.vy *= 0.96;
    }

    c.x += c.vx;
    c.y += c.vy;

    if (c.x < 0) { c.x = 0; c.vx = Math.abs(c.vx); }
    if (c.x > w - 40) { c.x = w - 40; c.vx = -Math.abs(c.vx); }
    if (c.y < 0) { c.y = 0; c.vy = Math.abs(c.vy); }
    if (c.y > h - 40) { c.y = h - 40; c.vy = -Math.abs(c.vy); }

    const facingLeft = c.vx < 0;
    c.el.style.transform = facingLeft ? 'scaleX(-1)' : 'scaleX(1)';
    c.el.style.left = c.x + 'px';
    c.el.style.top = c.y + 'px';
  }
  requestAnimationFrame(tick);
}

tick();
</script>
