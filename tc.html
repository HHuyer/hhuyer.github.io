<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Live Editor — HHuyer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --editor-bg: #0d0d14;
            --border: rgba(255,255,255,0.08);
            --text: #ededed;
            --text-muted: #666;
            --accent: #667eea;
            --accent2: #764ba2;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(10,10,15,0.8);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-left .logo {
            font-weight: 600;
            font-size: 0.95rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header-left .separator {
            color: var(--border);
            font-size: 1.2rem;
            font-weight: 300;
        }
        .header-left .title {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 400;
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            font-size: 0.75rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: rgba(255,255,255,0.08);
            color: var(--text);
            border-color: rgba(255,255,255,0.15);
        }
        .btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: #fff;
        }
        .btn.primary:hover { opacity: 0.9; }

        /* Editor container */
        .editor-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Editor panel */
        .editor-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .panel-header .label {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .panel-header .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }
        .line-count {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        #code {
            flex: 1;
            background: var(--editor-bg);
            color: #c9d1d9;
            border: none;
            padding: 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
            tab-size: 2;
        }
        #code::placeholder { color: rgba(255,255,255,0.15); }

        /* Preview panel */
        .preview-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
        }
        #output {
            flex: 1;
            border: none;
            background: #fff;
        }

        /* Resize handle */
        .resize-handle {
            width: 4px;
            cursor: col-resize;
            background: transparent;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .resize-handle:hover,
        .resize-handle.active {
            background: var(--accent);
        }

        @media (max-width: 768px) {
            .editor-container { flex-direction: column; }
            .editor-panel { width: 100%; height: 50%; border-right: none; border-bottom: 1px solid var(--border); }
            .preview-panel { width: 100%; height: 50%; }
            .resize-handle { display: none; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="/tools" class="logo" style="text-decoration:none">HHuyer Tools</a>
            <span class="separator">/</span>
            <span class="title">HTML Live Editor</span>
        </div>
        <div class="header-actions">
            <button class="btn" id="clearBtn" title="Xóa tất cả">Xóa</button>
            <button class="btn" id="copyBtn" title="Sao chép code">Sao chép</button>
            <button class="btn primary" id="runBtn" title="Chạy code (Ctrl+Enter)">Chạy ▶</button>
        </div>
    </header>

    <div class="editor-container">
        <div class="editor-panel" id="editorPanel">
            <div class="panel-header">
                <span class="label"><span class="dot"></span> Code</span>
                <span class="line-count" id="lineCount">Dòng: 0</span>
            </div>
            <textarea id="code" placeholder="Nhập HTML, CSS, JavaScript ở đây..." spellcheck="false"></textarea>
        </div>
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="preview-panel">
            <div class="panel-header">
                <span class="label"><span class="dot" style="background:#00b894"></span> Preview</span>
            </div>
            <iframe id="output" sandbox="allow-scripts allow-modals"></iframe>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('code');
        const iframe = document.getElementById('output');
        const lineCount = document.getElementById('lineCount');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const runBtn = document.getElementById('runBtn');

        let autoRun = true;

        function updatePreview() {
            iframe.srcdoc = textarea.value;
        }

        function updateLineCount() {
            const lines = textarea.value.split('\n').length;
            lineCount.textContent = `Dòng: ${lines}`;
        }

        textarea.addEventListener('input', () => {
            updateLineCount();
            if (autoRun) updatePreview();
        });

        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                textarea.value = textarea.value.substring(0, start) + '  ' + textarea.value.substring(end);
                textarea.selectionStart = textarea.selectionEnd = start + 2;
                textarea.dispatchEvent(new Event('input'));
            }
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                updatePreview();
            }
        });

        clearBtn.addEventListener('click', () => {
            textarea.value = '';
            updatePreview();
            updateLineCount();
            textarea.focus();
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(textarea.value).then(() => {
                const original = copyBtn.textContent;
                copyBtn.textContent = 'Đã sao chép!';
                setTimeout(() => { copyBtn.textContent = original; }, 1500);
            });
        });

        runBtn.addEventListener('click', updatePreview);

        // Resizable panels
        const handle = document.getElementById('resizeHandle');
        const editorPanel = document.getElementById('editorPanel');
        let isResizing = false;

        handle.addEventListener('mousedown', (e) => {
            isResizing = true;
            handle.classList.add('active');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const container = document.querySelector('.editor-container');
            const containerRect = container.getBoundingClientRect();
            const percent = ((e.clientX - containerRect.left) / containerRect.width) * 100;
            const clamped = Math.min(Math.max(percent, 20), 80);
            editorPanel.style.width = clamped + '%';
            document.querySelector('.preview-panel').style.width = (100 - clamped) + '%';
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                handle.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });

        // Default template
        textarea.value = `<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }
    h1 { font-size: 2.5rem; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
  </style>
</head>
<body>
  <h1>Hello World!</h1>
</body>
</html>`;
        updatePreview();
        updateLineCount();
    </script>
</body>
</html>
