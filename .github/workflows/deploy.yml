name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Thư mục chứa file index.html của bạn

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
